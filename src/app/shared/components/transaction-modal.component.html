<div class="overlay" (click)="onOverlayClick($event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2>{{ transaction ? 'Edit Transaction' : 'Add Transaction' }}</h2>
      <button class="close-btn" (click)="cancel.emit()">&#x2715;</button>
    </div>

    <div class="form-body">
      <div class="form-row">
        <label>Description</label>
        <input type="text" [(ngModel)]="form.description" placeholder="e.g. Swiggy Order" />
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label>Amount (₹)</label>
          <input type="number" [(ngModel)]="form.amount" placeholder="0" min="1" />
        </div>
        <div class="form-row">
          <label>Date</label>
          <input type="date" [(ngModel)]="form.date" />
        </div>
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label>Type</label>
          <select [(ngModel)]="form.type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-row">
          <label>Category</label>
          <select [(ngModel)]="form.category">
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
        </div>
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancel.emit()">Cancel</button>
      <button class="btn-save" (click)="submit()">
        {{ transaction ? 'Save Changes' : 'Add Transaction' }}
      </button>
    </div>
  </div>
</div>
